<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-100 flex justify-center items-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-96 text-gray-800">

        <h2 class="text-2xl font-semibold mb-6 text-center">
            Recuperar contraseña
        </h2>

        {% if messages %}
            {% for message in messages %}
                <p class="mb-4 text-sm text-center 
                    {% if message.tags == 'error' %}text-red-500{% else %}text-green-600{% endif %}">
                    {{ message }}
                </p>
            {% endfor %}
        {% endif %}

        <form action="" method="POST">
            {% csrf_token %}

            <label class="text-gray-700">Correo electrónico</label>
            <input type="email" name="email" required
                   class="w-full p-2 rounded bg-gray-100 text-gray-900 mt-2 mb-4">

            <button class="w-full bg-green-600 hover:bg-green-700 text-white p-2 rounded">
                Enviar enlace
            </button>
        </form>

        <a href="{% url 'sesion:login' %}" 
           class="block mt-4 text-center text-green-700 hover:underline">
            Volver al inicio de sesión
        </a>

    </div>

</body>
</html>
