{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>INFOSENA - Recuperar Contraseña</title>
    <link rel="icon" href="{% static 'img/logo2.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        .card {
            width: 100%;
            max-width: 460px;
            background: white;
            border-radius: 26px;
            box-shadow:
                0 4px 6px rgba(0,0,0,0.04),
                0 20px 60px rgba(13,54,4,0.1);
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            background: linear-gradient(135deg, #0d3604 0%, #1a6b0a 55%, #2b9e15 100%);
            padding: 2rem;
            text-align: center;
            color: white;
        }

        .card-header h2 {
            font-family: 'Sora', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
        }

        .card-header p {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 0.4rem;
        }

        .card-body {
            padding: 2rem;
        }

        .field-wrap {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            padding: 0.75rem 1rem;
            background: #fafafa;
            transition: all 0.2s;
        }

        .field-wrap:focus-within {
            border-color: #16a34a;
            background: white;
            box-shadow: 0 0 0 4px rgba(22,163,74,0.08);
        }

        .field-input {
            flex: 1;
            outline: none;
            background: transparent;
            border: none;
            font-size: 0.95rem;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            margin-top: 1.5rem;
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: white;
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(22,163,74,0.3);
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #15803d, #166534);
            transform: translateY(-1px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: #16a34a;
            font-weight: 600;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
            text-align: center;
        }

        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #991b1b; }
    </style>
</head>

<body class="bg-green-200 min-h-screen flex items-center justify-center mt-10 mb-10">

    <div class="card">

        <div class="card-header">
            <h2>Recuperar contraseña</h2>
            <p>Ingresa tu correo y te enviaremos un codigo</p>
        </div>

        <div class="card-body">

            {% if messages %}
                {% for message in messages %}
                    <div class="message {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="field-wrap">
                    <input type="email"
                           name="email"
                           placeholder="Correo electrónico"
                           autocomplete="email"
                           required
                           class="field-input">
                </div>

                <button type="submit" class="btn-submit">
                    Enviar codigo de recuperación
                </button>
            </form>

            <a href="{% url 'sesion:login' %}" class="back-link">
                ← Volver al inicio de sesión
            </a>

        </div>

    </div>

</body>
</html>
