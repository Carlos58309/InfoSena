{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoSena - Amistades</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200">

<header class="hero bg-gradient-to-r from-[#0d3604] to-[#2b9e15] shadow-lg sticky top-0 z-50">
    <nav class="container mx-auto px-2 py-2 relative">
        <div class="flex justify-between items-center">

            <div class="flex flex-row-reverse items-center">
                <img src="{% static 'image.png' %}" width="200px" />
            </div>

            <div class="hidden md:flex items-center w-full max-w-md bg-white rounded-full px-4 py-2 shadow-lg">
                <input type="text" placeholder="Search..."
                    class="flex-1 outline-none text-gray-700 placeholder-gray-400" />
            </div>
        </div>
    </nav>
</header>

<div class="pt-20 grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 h-screen">

    <aside class="hidden md:block md:col-span-1 bg-transparent overflow-y-auto h-[calc(100vh-5rem)] sticky top-20 p-4">
        <div class="space-y-4">

            <a href="{% url 'sesion:perfil' %}" class="flex items-center space-x-3 bg-white p-3 rounded-xl shadow">
                <div class="w-10 h-10 bg-gray-300 rounded-full"></div>
                <span>Mi perfil</span>
            </a>

            <a href="{% url 'sesion:home' %}"
                class="flex items-center space-x-3 bg-white p-3 rounded-xl shadow hover:bg-green-200 hover:text-green-700">
                <span>Inicio</span>
            </a>

            <a href="{% url 'sesion:amigos' %}"
                class="flex items-center space-x-3 bg-green-200 p-3 rounded-xl shadow text-green-700 font-bold">
                <span>Amigos</span>
            </a>

            <a href="{% url 'sesion:chat' %}"
                class="flex items-center space-x-3 bg-white p-3 rounded-xl shadow hover:bg-green-200 hover:text-green-700">
                <span>Chat</span>
            </a>

        </div>
    </aside>

    <main class="col-span-4 lg:col-span-4 p-4">

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-gray-800">Amigos</h2>
        </div>

        <div class="flex space-x-4 mb-6 border-b pb-2">
            <button id="btnSolicitudes"
                class="px-4 py-2 rounded-xl bg-green-600 text-white font-semibold hover:bg-green-700 transition">
                Solicitudes de amistad
            </button>

            <button id="btnAgregados"
                class="px-4 py-2 rounded-xl bg-gray-300 text-gray-800 font-semibold hover:bg-gray-400 transition">
                Amigos agregados
            </button>
        </div>

        <div id="solicitudesSection" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">

            {% for u in usuarios %}
            <div class="bg-white rounded-xl shadow p-4 text-center">

                <div class="w-24 h-24 mx-auto bg-gray-300 rounded-full mb-3"></div>

                <p class="font-semibold text-lg">{{ u.nombre }}</p>

                <p class="text-gray-400 text-sm mb-3">{{ u.email }}</p>

                <p class="text-xs text-gray-500 italic mb-2">{{ u.modelo }}</p>

                <div class="border-t border-gray-300 mb-3"></div>

                <button class="w-full bg-green-600 text-white py-1.5 rounded-lg mb-2 hover:bg-green-700">
                    Agregar amigo
                </button>

                <button class="w-full bg-gray-500 text-white py-1.5 rounded-lg hover:bg-gray-600">
                    Ver perfil
                </button>

            </div>
            {% empty %}
            <p class="text-gray-500">No hay usuarios registrados.</p>
            {% endfor %}

        </div>

        <div id="agregadosSection" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 hidden">
            <div class="bg-white rounded-xl shadow p-4 text-center">
                <div class="w-24 h-24 mx-auto bg-gray-300 rounded-full mb-3"></div>
                <h3 class="font-semibold text-lg mb-2">Amigo agregado</h3>
            </div>
        </div>

    </main>
</div>

<script>
    const btnSolicitudes = document.getElementById("btnSolicitudes");
    const btnAgregados = document.getElementById("btnAgregados");
    const solicitudesSection = document.getElementById("solicitudesSection");
    const agregadosSection = document.getElementById("agregadosSection");

    btnSolicitudes.addEventListener("click", () => {
        solicitudesSection.classList.remove("hidden");
        agregadosSection.classList.add("hidden");
    });

    btnAgregados.addEventListener("click", () => {
        agregadosSection.classList.remove("hidden");
        solicitudesSection.classList.add("hidden");
    });
</script>

</body>
</html>
