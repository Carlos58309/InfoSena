<!-- Inputs generales para Instructor y Bienestar -->
<div class="space-y-4">

    <!-- Nombre -->
    <div>
        <label class="text-gray-700 font-medium">Nombre completo</label>
        <div class="flex items-center p-3 border-2 rounded-xl bg-white">
            <span class="text-2xl mr-3">👤</span>
            <input type="text" name="nombre" required placeholder="Tu nombre"
                class="flex-1 outline-none bg-transparent">
        </div>
    </div>

    <!-- Documento -->
    <div>
        <label class="text-gray-700 font-medium">Documento</label>
        <div class="flex items-center p-3 border-2 rounded-xl bg-white">
            <span class="text-2xl mr-3">🪪</span>
            <input type="text" name="documento" required placeholder="Número de documento"
                class="flex-1 outline-none bg-transparent">
        </div>
    </div>

    <!-- Correo -->
    <div>
        <label class="text-gray-700 font-medium">Correo institucional</label>
        <div class="flex items-center p-3 border-2 rounded-xl bg-white">
            <span class="text-2xl mr-3">📧</span>
            <input type="email" name="correo" required placeholder="correo@misena.edu.co"
                class="flex-1 outline-none bg-transparent">
        </div>
    </div>

    <!-- Teléfono -->
    <div>
        <label class="text-gray-700 font-medium">Teléfono</label>
        <div class="flex items-center p-3 border-2 rounded-xl bg-white">
            <span class="text-2xl mr-3">📞</span>
            <input type="text" name="telefono" required placeholder="Tu número"
                class="flex-1 outline-none bg-transparent">
        </div>
    </div>

    <!-- Contraseña -->
    <div>
        <label class="text-gray-700 font-medium">Contraseña</label>
        <div class="flex items-center p-3 border-2 rounded-xl bg-white">
            <span class="text-2xl mr-3">🔒</span>
            <input type="password" name="password" required placeholder="Tu contraseña"
                class="flex-1 outline-none bg-transparent">
        </div>
    </div>

    <button type="submit"
        class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl text-lg font-semibold shadow-md mt-4">
        Registrarse
    </button>

</div>
