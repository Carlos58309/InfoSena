{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificar Código</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-xl w-96">

    <h2 class="text-2xl font-bold text-center mb-6">
        Verificar Código
    </h2>

    {% if messages %}
        {% for message in messages %}
            <p class="text-center mb-4
            {% if message.tags == 'error' %}text-red-500
            {% else %}text-green-600{% endif %}">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'sesion:verificar_codigo' %}">
        {% csrf_token %}

        <input type="text"
               name="codigo"
               maxlength="6"
               pattern="[0-9]{6}"
               placeholder="000000"
               class="w-full p-3 text-center text-xl tracking-widest border rounded mb-4"
               required>

        <button class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded">
            Verificar
        </button>
    </form>

    <a href="{% url 'sesion:login' %}"
       class="block text-center mt-4 text-green-700 hover:underline">
        Volver al login
    </a>

</div>

</body>
</html>
