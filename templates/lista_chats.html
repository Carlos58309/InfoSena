<h2>Mis chats</h2>

<ul>
    {% for c in chats %}
        {% for p in c.participantes.all %}
            {% if p != yo %}
                <li>
                    <a href="{% url 'chat:ver_chat' p.id %}">
                        Chat con {{ p.nombre }}
                    </a>
                </li>
            {% endif %}
        {% endfor %}
    {% empty %}
        <p>No tienes chats todavía.</p>
    {% endfor %}
</ul>
