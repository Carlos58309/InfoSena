<h2>Mis chats</h2>

<ul>
    {% for c in chats %}
        {% if c.usuario1 == yo %}
            {% with otro=c.usuario2 %}
        {% else %}
            {% with otro=c.usuario1 %}
        {% endif %}

        <li>
            <a href="{% url 'ver_chat' otro.id %}">
                Chat con {{ otro.nombre }}
            </a>
        </li>

        {% endwith %}
    {% empty %}
        <p>No tienes chats todavía.</p>
    {% endfor %}
</ul>
