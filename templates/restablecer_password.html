<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-100 flex justify-center items-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-96">

        <h2 class="text-gray-900 text-2xl font-semibold mb-6 text-center">
            Restablecer contraseña
        </h2>

        {% if messages %}
            {% for message in messages %}
                <p class="mb-4 text-sm text-center 
                  {% if message.tags == 'error' %}text-red-500{% else %}text-green-600{% endif %}">
                    {{ message }}
                </p>
            {% endfor %}
        {% endif %}

        <form action="" method="POST">
            {% csrf_token %}

            <label class="text-gray-700">Nueva contraseña</label>
            <input type="password" name="password1" required
                   class="w-full p-2 rounded bg-gray-100 text-gray-900 mt-2 mb-4">

            <label class="text-gray-700">Confirmar contraseña</label>
            <input type="password" name="password2" required
                   class="w-full p-2 rounded bg-gray-100 text-gray-900 mt-2 mb-6">

            <button class="w-full bg-green-600 hover:bg-green-700 text-white p-2 rounded">
                Guardar nueva contraseña
            </button>
        </form>

    </div>

</body>
</html>
