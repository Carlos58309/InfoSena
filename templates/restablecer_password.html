{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>INFOSENA - Restablecer contraseña</title>
    <link rel="icon" href="{% static 'img/logo2.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Inter',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:1.5rem;
        }

        .card{
            width:100%;
            max-width:480px;
            background:#fff;
            border-radius:26px;
            box-shadow:0 20px 60px rgba(13,54,4,.1);
            overflow:hidden;
            animation:fade .4s ease;
        }

        @keyframes fade{
            from{opacity:0;transform:translateY(20px)}
            to{opacity:1;transform:translateY(0)}
        }

        .card-header{
            background:linear-gradient(135deg,#0d3604 0%,#1a6b0a 55%,#2b9e15 100%);
            padding:2rem;
            text-align:center;
            color:#fff;
        }

        .card-header h2{
            font-family:'Sora',sans-serif;
            font-size:1.6rem;
            font-weight:800;
        }

        .card-body{padding:2rem}

        .field{margin-bottom:1.2rem}

        .input-wrap{
            display:flex;
            align-items:center;
            border:2px solid #e5e7eb;
            border-radius:14px;
            padding:.8rem 1rem;
            background:#fafafa;
            transition:.2s;
        }

        .input-wrap:focus-within{
            border-color:#16a34a;
            background:#fff;
            box-shadow:0 0 0 4px rgba(22,163,74,.08);
        }

        .input{
            flex:1;
            border:none;
            outline:none;
            background:transparent;
            font-size:.95rem;
        }

        .toggle{
            background:none;
            border:none;
            cursor:pointer;
            color:#9ca3af;
        }

        .btn{
            width:100%;
            padding:.9rem;
            margin-top:1rem;
            background:linear-gradient(135deg,#16a34a,#15803d);
            color:#fff;
            font-family:'Sora',sans-serif;
            font-weight:700;
            border:none;
            border-radius:14px;
            cursor:pointer;
            transition:.2s;
            box-shadow:0 4px 14px rgba(22,163,74,.3);
        }

        .btn:hover{
            background:linear-gradient(135deg,#15803d,#166534);
            transform:translateY(-1px);
        }

        .message{
            padding:.7rem 1rem;
            border-radius:12px;
            font-size:.85rem;
            font-weight:600;
            margin-bottom:1rem;
            text-align:center;
        }

        .success{background:#dcfce7;color:#166534}
        .error{background:#fee2e2;color:#991b1b}

        .strength-bar{
            height:6px;
            border-radius:6px;
            margin-top:.5rem;
            transition:.3s;
            background:#e5e7eb;
        }

        .req{
            font-size:.75rem;
            margin-top:.4rem;
        }

        .req.valid{color:#16a34a}
        .req.invalid{color:#dc2626}
    </style>
</head>

<body class="bg-green-200 min-h-screen flex justify-center mt-10 mb-10">

<div class="card">

    <div class="card-header">
        <h2>Restablecer contraseña</h2>
        <p class="text-sm opacity-80 mt-1">Crea una nueva contraseña segura</p>
    </div>

    <div class="card-body">

        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- Nueva contraseña -->
            <div class="field">
                <div class="input-wrap">
                    <input type="password"
                           name="password1"
                           id="password1"
                           class="input"
                           placeholder="Nueva contraseña"
                           required>
                    <button type="button" class="toggle" onclick="toggle('password1')">👁</button>
                </div>

                <div id="strengthBar" class="strength-bar"></div>

                <p id="lengthReq" class="req invalid">• Mínimo 8 caracteres</p>
                <p id="upperReq" class="req invalid">• 1 mayúscula</p>
                <p id="numberReq" class="req invalid">• 3 número</p>
                <p id="specialReq" class="req invalid">• 1 carácter especial</p>
            </div>

            <!-- Confirmar contraseña -->
            <div class="field">
                <div class="input-wrap">
                    <input type="password"
                           name="password2"
                           id="password2"
                           class="input"
                           placeholder="Confirmar contraseña"
                           required>
                    <button type="button" class="toggle" onclick="toggle('password2')">👁</button>
                </div>
                <p id="matchMsg" class="req"></p>
            </div>

            <button type="submit" class="btn">
                Guardar nueva contraseña
            </button>

        </form>

    </div>
</div>

<script>
function toggle(id){
    const input=document.getElementById(id);
    input.type=input.type==='password'?'text':'password';
}

const pass=document.getElementById('password1');
const confirmPass=document.getElementById('password2');
const strengthBar=document.getElementById('strengthBar');

pass.addEventListener('input',()=>{
    const val=pass.value;

    const length=val.length>=8;
    const upper=/[A-Z]/.test(val);
    const number=(val.match(/[0-9]/g)||[]).length >= 3;
    const special=/[!@#$%^&*.]/.test(val);

    document.getElementById('lengthReq').className='req '+(length?'valid':'invalid');
    document.getElementById('upperReq').className='req '+(upper?'valid':'invalid');
    document.getElementById('numberReq').className='req '+(number?'valid':'invalid');
    document.getElementById('specialReq').className='req '+(special?'valid':'invalid');

    let score=[length,upper,number,special].filter(Boolean).length;

    const colors=['#dc2626','#f97316','#eab308','#16a34a'];
    strengthBar.style.width=(score*25)+'%';
    strengthBar.style.background=colors[score-1]||'#e5e7eb';
});

confirmPass.addEventListener('input',()=>{
    const msg=document.getElementById('matchMsg');
    if(confirmPass.value===pass.value && confirmPass.value!==''){
        msg.textContent='✓ Las contraseñas coinciden';
        msg.className='req valid';
    }else{
        msg.textContent='✕ Las contraseñas no coinciden';
        msg.className='req invalid';
    }
});
</script>

</body>
</html>
