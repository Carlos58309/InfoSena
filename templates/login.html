{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INFOSENA - Registro</title>
    <link rel="icon" href="{% static 'img/logo2.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Animaciones personalizadas -->
    <style>
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-green-200 min-h-screen flex flex-col bg-cover bg-center font-sans">

    <!-- MENSAJES -->
    {% if messages %}
    <div class="fixed top-20 left-1/2 -translate-x-1/2 w-11/12 max-w-md z-50">
        {% for message in messages %}
        <div class="
            p-4 rounded-lg mb-2 font-medium animate-[slideDown_0.3s_ease-out]
            {% if message.tags == 'success' %} bg-green-600 text-white
            {% elif message.tags == 'error' %} bg-red-600 text-white
            {% elif message.tags == 'warning' %} bg-yellow-500 text-white
            {% elif message.tags == 'info' %} bg-blue-600 text-white
            {% endif %}
        ">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- ENCABEZADO -->


    <!-- CONTENEDOR -->
    <div class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white/95 shadow-2xl rounded-2xl p-8 w-full max-w-lg">

            <!-- HEADER DEL CARD -->
            <div class="flex items-center justify-between mb-6">
<a href="{% url 'sesion:index' %}" 
   class="flex items-center gap-2 text-green-700 text-lg font-medium cursor-pointer 
          transition-transform hover:-translate-x-1 active:scale-95">

    <div class="w-9 h-9 flex items-center justify-center bg-green-600 text-white rounded-full shadow-md 
                transition-colors hover:bg-green-700">

        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
             stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>

    </div>

    <span class="hidden sm:block">Regresar</span>

</a>

                <img src="{% static 'img/logo.png' %}" alt="INFOSENA" class="w-56 h-auto">
            </div>
<div class="flex flex-col items-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-800 tracking-wide">Inicio de Sesión</h2>
        </div>
            <!-- FORMULARIO -->
            <form method="POST" action="{% url 'sesion:login' %}">
                {% csrf_token %}

                <!-- Documento -->
                <div class="mb-4">
                    <div
                        class="flex items-center border-2 border-gray-300 rounded-xl p-3 focus-within:border-green-600 transition">
                        <span class="text-2xl mr-3">👤</span>
                        <input type="text" name="documento" id="documento" placeholder="Número de documento"
                            class="flex-1 outline-none text-gray-700 text-lg bg-transparent" required>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-4">
                    <div
                        class="flex items-center border-2 border-gray-300 rounded-xl p-3 focus-within:border-green-600 transition">
                        <span class="text-2xl mr-3">🔒</span>
                        <input type="password" name="password" id="password" placeholder="Contraseña"
                            class="flex-1 outline-none text-gray-700 text-lg bg-transparent" required>
                    </div>
                </div>

                <!-- BOTÓN -->
                <button type="submit"
                    class="w-full bg-green-600 text-white py-3 rounded-xl text-lg font-semibold mt-4 hover:bg-green-700 active:scale-95 transition">
                    Iniciar sesión
                </button>
            </form>

            <!-- OLVIDASTE TU CONTRASEÑA -->
            <div class="text-center mt-4">
                <a href="{% url 'sesion:solicitar_correo' %}"
                    class="text-green-600 underline hover:text-green-700 transition">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>
        </div>
    </div>
<script>
        const inputDocumento = document.getElementById("documento");
        const errorDocumento = document.getElementById("error_documento");

        inputDocumento.addEventListener("input", (e) => {
            // Eliminar cualquier carácter que no sea número
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            
            // Mostrar error si se intentó ingresar algo que no es número
            if (/[^0-9]/.test(e.target.value)) {
                errorDocumento.classList.remove("hidden");
            } else {
                errorDocumento.classList.add("hidden");
            }
        });
</script>
    <!-- LIMPIAR CAMPOS AL CARGAR -->
    <script>
        window.addEventListener('load', () => {
            document.getElementById('documento').value = '';
            document.getElementById('password').value = '';
        });
    </script>

    <!-- OCULTAR MENSAJES -->
    <script>
        setTimeout(() => {
            const messages = document.querySelectorAll('.animate-[slideDown_0.3s_ease-out]');
            messages.forEach(msg => {
                msg.style.transition = 'opacity 0.5s';
                msg.style.opacity = '0';
                setTimeout(() => msg.remove(), 500);
            });
        }, 5000);
    </script>

</body>

</html>
