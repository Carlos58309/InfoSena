{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - INFOSENA</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: white;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        .input:focus {
            outline: none;
            border-color: rgb(2, 151, 39);
            box-shadow: 0 0 4px rgb(2, 151, 39);
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>

<body class="bg-green-200 min-h-screen flex items-center justify-center mt-10 mb-10">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl p-10">

        <!-- BOTÓN REGRESAR -->
        <div class="flex items-center justify-between mb-6">
            <a href="{% url 'sesion:index' %}"
               class="flex items-center gap-2 text-green-700 text-lg font-medium cursor-pointer 
               transition-transform hover:-translate-x-1 active:scale-95">

                <div class="w-9 h-9 flex items-center justify-center bg-green-600 text-white rounded-full shadow-md 
                transition-colors hover:bg-green-700">

                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                    </svg>

                </div>

                <span class="hidden sm:block">Regresar</span>
            </a>

            <img src="{% static 'img/logo.png' %}" alt="INFOSENA" class="w-56 h-auto">
        </div>

        <!-- MENSAJES -->
        {% if messages %}
        <div class="mb-4">
            {% for m in messages %}
            <div class="p-3 text-white rounded-lg
                        {% if 'error' in m.tags %}bg-red-500{% else %}bg-green-600{% endif %}">
                {{ m }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Formulario maestro -->
        <form id="form_general" method="POST" action="{% url 'registro:registro' %}">
            {% csrf_token %}

            <div class="flex flex-col items-center mb-8">
                <h2 class="text-3xl font-extrabold text-gray-800 tracking-wide">Registro de Usuarios</h2>
            </div>

            <!-- Guardar el rol oculto -->
            <input type="hidden" id="rol_seleccionado" name="rol" value="bienestar">

            <!-- SELECTOR DE ROL -->
            <div class="mb-6">
                <label class="block mb-2 text-lg font-semibold text-gray-700">
                    Selecciona un tipo de rol:
                </label>

                <select id="select_opcion" class="input">
                    <option value="bienestar">Bienestar</option>
                    <option value="instructor">Instructor</option>
                    <option value="aprendiz">Aprendiz</option>
                </select>
            </div>

            <!-- ==========================
                 FORMULARIO GENERAL
            =========================== -->
            <div class="grid grid-cols-2 gap-4">

                <div>
                    <label class="font-semibold block">Número de Documento</label>
                    <input type="text" name="numero_documento" class="input" required>
                </div>

                <div>
                    <label class="font-semibold block">Tipo de Documento</label>
                    <select name="tipo_documento" class="input" required>
                        <option>Cédula de ciudadanía</option>
                        <option>Tarjeta de identidad</option>
                        <option>Cédula extranjera</option>
                        <option>Pasaporte</option>
                    </select>
                </div>

                <div class="col-span-2">
                    <label class="font-semibold block">Nombre Completo</label>
                    <input type="text" name="nombre" class="input" required>
                </div>

                <div class="col-span-2">
                    <label class="font-semibold block">Correo</label>
                    <input type="email" name="email" class="input" required>
                </div>

                <div>
                    <label class="font-semibold block">Centro Formativo</label>
                    <input type="text" name="centro_formativo"
                        value="Centro Agroempresarial y Desarrollo Pecuario del Huila" class="input">
                </div>

                <div>
                    <label class="font-semibold block">Región</label>
                    <input type="text" name="region" value="Huila" class="input" readonly>
                </div>

                <!-- Campos extra solo para aprendiz -->
                <div id="caja_aprendiz" class="hidden col-span-2 grid grid-cols-2 gap-4">

                    <div>
                        <label class="font-semibold block">Jornada</label>
                        <select name="jornada" class="input">
                            <option>Mañana</option>
                            <option>Tarde</option>
                            <option>Noche</option>
                        </select>
                    </div>

                    <div>
                        <label class="font-semibold block">Ficha</label>
                        <input type="text" name="ficha" class="input">
                    </div>

                </div>

                <div>
                    <label class="font-semibold block">Contraseña</label>
                    <input type="password" name="password" id="pass" class="input" required>
                </div>

                <div>
                    <label class="font-semibold block">Confirmar Contraseña</label>
                    <input type="password" id="confirm" class="input" required>
                    <p id="error_pass" class="error"></p>
                </div>

            </div>

            <!-- BOTÓN -->
            <div class="mt-10 text-center">
                <button type="submit"
                    class="bg-green-600 hover:bg-green-700 text-white px-10 py-3 rounded-xl shadow-lg font-semibold">
                    Registrar
                </button>
            </div>

        </form>

    </div>

    <!-- SCRIPT -->
    <script>
        const select = document.getElementById("select_opcion");
        const rol_hidden = document.getElementById("rol_seleccionado");
        const caja_aprendiz = document.getElementById("caja_aprendiz");

        select.addEventListener("change", () => {
            rol_hidden.value = select.value;

            // mostrar campos de aprendiz
            if (select.value === "aprendiz") {
                caja_aprendiz.classList.remove("hidden");
            } else {
                caja_aprendiz.classList.add("hidden");
            }
        });

        // Validación de contraseña
        document.getElementById("form_general").addEventListener("submit", function (e) {
            let pass = document.getElementById("pass").value;
            let confirm = document.getElementById("confirm").value;
            let error = document.getElementById("error_pass");

            if (pass !== confirm) {
                error.textContent = "Las contraseñas no coinciden.";
                e.preventDefault();
            } else {
                error.textContent = "";
            }
        });
    </script>

</body>
</html>
